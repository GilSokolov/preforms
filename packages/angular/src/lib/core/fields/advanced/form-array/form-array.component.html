<section [formGroup]="group" class="preforms-array-container">
  <header class="preforms-array-header">
    <div>
      @if (field.label) {
        <p class="preforms-array-label">{{ field.label }}</p>
      }

      @if (field.description) {
        <p class="preforms-array-description">{{ field.description }}</p>
      }
    </div>

    @if (field.addButton) {
      <button
        [disabled]="addBtnDisabled"
        class="preforms-array-add"
        type="button"
        (click)="add()"
      >
        &plus; Add Item
      </button>
    }
  </header>

  <div
    cdkDropList
    (cdkDropListDropped)="drop($event)"
    [formArrayName]="field.key"
    [class]="['preforms-array', field.className]"
  >
    @for (formGroup of array.controls; track formGroup; let i = $index) {
      <div cdkDrag [formGroupName]="i" class="preforms-array-item">
        <preforms-array-handle />

        <preforms-group
          [fields]="fields(i)"
          [control]="formGroup"
          class="preforms-array-group"
        />

        @if (field.removeButton) {
          <button
            [disabled]="removeBtnDisabled"
            class="preforms-array-remove"
            type="button"
            (click)="remove(i)"
          >
            &#10005;
          </button>
        }
      </div>
    }

    <div class="preforms-field-hint">{{ field.hint }}</div>
    <div class="preforms-field-error">{{ error }}</div>
  </div>
</section>
